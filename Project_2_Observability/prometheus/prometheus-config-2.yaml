apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'node-redis' 
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: (.+)(?::\d+);(\d+)
          replacement: $1:$2
      - job_name: 'redis'
        static_configs:
        - targets: ['redis.default.svc.cluster.local:9121']  # Redis Exporter của main
      - job_name: 'redis-replica'
        static_configs:
        - targets: ['redis-replica.default.svc.cluster.local:9121']  # Redis Exporter của replica
      - job_name: 'node-exporter'  # Tùy chọn cho Kubernetes metrics
        static_configs:
        - targets: ['node-exporter.monitoring.svc.cluster.local:9100']


Thêm job cho redis-replica để theo dõi hiệu suất replica.
Thêm job node-exporter (tùy chọn) để lấy metrics cluster.
Dùng tên service đầy đủ (FQDN) để đảm bảo Prometheus tìm đúng target trong Kubernetes.